core:changelogs:
  - content: "---\npackages:\n  npm:@fumadocs/base-ui:\n    type: patch\n  npm:fumadocs-ui:\n    type: patch\n---\n\n## Correct codeblock props\n\nThe type of `title` is now `ReactNode` instead of string.\n"
    filename: 2026-07-15-mrlu2n34.md
    v: 0.0.0
  - content: "---\npackages:\n  npm:@fumadocs/base-ui:\n    type: patch\n  npm:fumadocs-ui:\n    type: patch\n  npm:@fumadocs/language:\n    type: patch\n---\n\n## Expose sidebar trigger state to assistive technology\n\n`SidebarTrigger` now sets `aria-expanded` and `aria-controls`, and its label changes between `Open Sidebar` and `Close Sidebar` depending on the state.\n\nPreviously, both the button opening the mobile sidebar and the one closing it were named `Open Sidebar`, and neither conveyed whether the sidebar was open.\n\nA new `Close Sidebar` translation key is available for customisation.\n"
    filename: 2026-07-15-mrm8481j.md
    v: 0.0.0
  - content: "---\npackages:\n  npm:fumadocs-mdx:\n    type: minor\n---\n\n## Support Macro API\n\nUse `fumadocs-mdx/macro` to define collections, and enable the macro-style API from bundler plugin (e.g. `createMDX`) using the `include` option.\n"
    filename: 2026-07-15-mrkxanx8.md
    v: 0.0.0
  - content: "---\npackages:\n  npm:fumadocs-openapi:\n    type: patch\n---\n\n## Fix invalid data in generated request examples\n\nRemove invalid data from generated request body example.\n"
    filename: 2026-07-15-mrm7955n.md
    v: 0.0.0
