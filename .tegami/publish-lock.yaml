core:changelogs:
  - content: "---\npackages:\n  npm:@fumadocs/api-docs:\n    type: minor\n  npm:@fumadocs/asyncapi:\n    type: minor\n  npm:@fumadocs/base-ui:\n    type: minor\n  npm:@fumadocs/basehub:\n    type: minor\n  npm:@fumadocs/cli:\n    type: minor\n  npm:@fumadocs/content:\n    type: minor\n  npm:@fumadocs/content-collections:\n    type: minor\n  npm:fumadocs-core:\n    type: minor\n  npm:create-fumadocs-app:\n    type: minor\n  npm:create-fumadocs-versions:\n    type: minor\n  npm:fumadocs-docgen:\n    type: minor\n  npm:@fumadocs/language:\n    type: minor\n  npm:fumadocs-epub:\n    type: minor\n  npm:@fumadocs/local-md:\n    type: minor\n  npm:fumadocs-mdx:\n    type: minor\n  npm:@fumadocs/mdx-remote:\n    type: minor\n  npm:fumadocs-obsidian:\n    type: minor\n  npm:fumadocs-openapi:\n    type: minor\n  npm:fumadocs-preview:\n    type: minor\n  npm:fumadocs-python:\n    type: minor\n  npm:fumadocs-ui:\n    type: minor\n  npm:@fumadocs/sanity:\n    type: minor\n  npm:@fumadocs/satteri:\n    type: minor\n  npm:@fumadocs/shadcn:\n    type: minor\n  npm:@fumari/stf:\n    type: minor\n  npm:@fumadocs/story:\n    type: minor\n  npm:@fumadocs/tailwind:\n    type: minor\n  npm:fumadocs-twoslash:\n    type: minor\n  npm:fumadocs-typescript:\n    type: minor\n  npm:@fumadocs/vite:\n    type: minor\n---\n\n## Default to Base UI\n\nInternal packages & templates now use Base UI rather than Radix UI.\n"
    filename: 2026-07-05-mr6or9jd.md
    v: 0.0.0
  - content: "---\npackages:\n  npm:@fumadocs/base-ui:\n    type: patch\n  npm:fumadocs-ui:\n    type: patch\n---\n\n## Updated the theme switch to use `document.startViewTransition()` for smoother theme transitions with graceful fallback.\n"
    filename: 2026-07-02-mr2nfni8.md
    v: 0.0.0
  - content: "---\npackages:\n  group:fumadocs:\n    type: patch\n---\n\n## Support `noCopy` attribute for codeblocks\n\nUse `noCopy` to remove copy button from codeblocks.\n"
    filename: 2026-07-06-mr83xhfa.md
    v: 0.0.0
  - content: "---\npackages:\n  fumadocs-openapi:\n    type: patch\n---\n\n## Add Rust codegen for OpenAPI examples\n"
    filename: 2026-06-30-mr0tjxke.md
    v: 0.0.0
