# Minimal repro for fumadocs TypeScript stack overflow. Recursive AggregationBucket.
openapi: 3.0.0
info:
  title: Records API (Generic Repro)
  version: '1.0'

servers:
  - url: https://api.example.com

components:
  schemas:
    AggregationNode:
      type: object
      required: [field]
      properties:
        field: { type: string }
        aggMap:
          type: array
          items:
            $ref: '#/components/schemas/AggregationNode'
    AggregationBucket:
      type: object
      properties:
        term: { type: string }
        value:
          type: array
          items:
            $ref: '#/components/schemas/AggregationBucket'

paths:
  /api/5.0/records/aggregation:
    post:
      summary: Aggregate records
      operationId: aggregateRecords
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                aggMap:
                  type: array
                  items:
                    $ref: '#/components/schemas/AggregationNode'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/AggregationBucket'
